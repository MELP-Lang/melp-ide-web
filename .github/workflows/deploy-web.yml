name: Deploy MELP Web Editörü → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'editors/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:   # elle tetiklenebilir

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/web/package-lock.json

      - name: Bağımlılıkları yükle
        working-directory: editors/web
        run: npm ci

      - name: Derle (esbuild)
        working-directory: editors/web
        run: npm run build

      - name: GitHub Pages hazırla
        uses: actions/configure-pages@v4

      - name: Artifact yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: editors/web/dist

      - name: GitHub Pages'e deploy et
        id: deploy
        uses: actions/deploy-pages@v4
